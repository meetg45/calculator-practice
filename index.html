<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="display-area">
            <input type="text">
        </div>
        <div class="buttons-area">
            <div class="four-btn-row second">
                <button class="btn deg">DEG <sub>RED</sub></button>
                <button class="btn trigo sin">sin</button>
                <button class="btn trigo cos">cos</button>
                <button class="btn trigo tan">tan</button>
                <!-- <button class="btn"><span style='font-size:20px;'>&#402;</span> Function</button> -->
            </div> 

            <div class="main-grid">
                <!-- <button class="btn number">2<sup>nd</sup></button> -->
                <button class="btn x2">x<sup>2</sup></button>
                <button class="btn pi"><span style='font-size:22px;'>&#x3C0;</span></button>
                <button class="btn number">e</button>
                <button class="btn clear">C</button>
                <button class="btn backspace"><span style='font-size:15px;'>&#x232B;</span></button>
                <button class="btn sqrt"><span style='font-size:20px;'>&#8730;x</span></button>
                <button class="btn inverse">1/x</button>
                <button class="btn number">|x|</button>
                <button class="btn number">exp</button>
                <button class="btn mod">%</button>
                <button class="btn xy">x<sup>y</sup></button>
                <button class="btn number"><span style='font-size:15px;'>&#x28;</span></button>
                <button class="btn number"><span style='font-size:15px;'>&#x29;</span></button>
                <button class="btn factorial">!</button>
                <!-- <button class="btn factorial">n<span style='font-size:15px;'>&#33;</span></button> -->
                <button class="btn operator">/</button>
                <button class="btn 10x">10<sup>x</sup></button>
                <button class="btn number">7</button>
                <button class="btn number">8</button>
                <button class="btn number">9</button>
                <button class="btn operator">*</button>
                <button class="btn number">log</button>
                <button class="btn number">4</button>
                <button class="btn number">5</button>
                <button class="btn number">6</button>
                <button class="btn operator">-</button>
                <button class="btn number">ln</button>
                <button class="btn number">1</button>
                <button class="btn number">2</button>
                <button class="btn number">3</button>
                <button class="btn operator">+</button>
                <button class="btn ANS">ANS</button>
                <button class="btn number">00</button>
                <button class="btn number">0</button>
                <button class="btn number">.</button>
                <button class="btn equal">=</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
