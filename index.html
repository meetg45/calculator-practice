<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="display-area">
            <input type="text">
        </div>
        <div class="buttons-area">
            
            <div class="two-btn-row first">
                <button class="btn">DEG</button>
                <button class="btn">F-E</button>
            </div>
            
            <div class="two-btn-row second">
                <button class="btn">Trigonometry</button>
                <button class="btn">Function</button>
            </div> 

            <div class="main-grid">
                <button class="btn number">MC</button>
                <button class="btn number">MR</button>
                <button class="btn number">M+</button>
                <button class="btn number">M-</button>
                <button class="btn number">MS</button>
                <button class="btn number">2</button>
                <button class="btn number">Pie</button>
                <button class="btn number">e</button>
                <button class="btn number">C</button>
                <button class="btn number">Cross</button>
                <button class="btn number">X2</button>
                <button class="btn number">1/x</button>
                <button class="btn number">|x|</button>
                <button class="btn number">exp</button>
                <button class="btn number">mod</button>
                <button class="btn number">2x</button>
                <button class="btn number">(</button>
                <button class="btn number">)</button>
                <button class="btn number">n!</button>
                <button class="btn operator">/</button>
                <button class="btn number">xy</button>
                <button class="btn number">7</button>
                <button class="btn number">8</button>
                <button class="btn number">9</button>
                <button class="btn operator">*</button>
                <button class="btn number">10X</button>
                <button class="btn number">4</button>
                <button class="btn number">5</button>
                <button class="btn number">6</button>
                <button class="btn operator">-</button>
                <button class="btn number">log</button>
                <button class="btn number">1</button>
                <button class="btn number">2</button>
                <button class="btn number">3</button>
                <button class="btn operator">+</button>
                <button class="btn number">ln</button>
                <button class="btn number">+/-</button>
                <button class="btn number">0</button>
                <button class="btn number">.</button>
                <button class="btn equal">=</button>
            </div>
        </div>
    </div>
</body>
</html>
