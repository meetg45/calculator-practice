<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="display-area">
            <input type="text">
        </div>
        <div class="buttons-area">
            
            <div class="two-btn-row first">
                <button class="btn">DEG</button>
                <button class="btn">F-E</button>
            </div>
            
            <div class="two-btn-row second">
                <button class="btn"><span style='font-size:22px;'>&#8895;</span>
                    <select name="Trigonometry" style="border: none;">
                        <option>Trigonometry</option>
                        <option>sin</option>
                        <option>cose</option>
                        <option>tan</option>
                        <option>cot</option>
                        <option>sec</option>
                        <option>cosec</option>
                    </select>
                </button>
                <button class="btn"><span style='font-size:20px;'>&#402;</span> Function</button>
            </div> 

            <div class="main-grid">
                <button class="btn number">MC</button>
                <button class="btn number">MR</button>
                <button class="btn number">M+</button>
                <button class="btn number">M-</button>
                <button class="btn number">MS</button>
                <button class="btn number">2<sup>nd</sup></button>
                <button class="btn number"><span style='font-size:22px;'>&#x3C0;</span></button>
                <button class="btn number">e</button>
                <button class="btn number">C</button>
                <button class="btn number"><span style='font-size:15px;'>&#x232B;   </span></button>
                <button class="btn number"><span style='font-size:15px;'>&#119987;</span><sup>2</sup></button>
                <button class="btn number">1/<span style='font-size:10px;'>&#119987;</span></button>
                <button class="btn number">|<span style='font-size:15px;'>&#119987;</span>|</button>
                <button class="btn number">exp</button>
                <button class="btn number">mod</button>
                <button class="btn number"><span style='font-size:20px;'>&#8730;<span style='font-size:15px;'>&#119987;</span></span></button>
                <button class="btn number"><span style='font-size:15px;'>&#x28;</span></button>
                <button class="btn number"><span style='font-size:15px;'>&#x29;</span></button>
                <button class="btn number">n<span style='font-size:15px;'>&#33;</span></button>
                <button class="btn operator">/</button>
                <button class="btn number">x<sup>y</sup></button>
                <button class="btn number">7</button>
                <button class="btn number">8</button>
                <button class="btn number">9</button>
                <button class="btn operator">*</button>
                <button class="btn number">10<sup><span style='font-size:10px;'>&#119987;</span></sup></button>
                <button class="btn number">4</button>
                <button class="btn number">5</button>
                <button class="btn number">6</button>
                <button class="btn operator">-</button>
                <button class="btn number">log</button>
                <button class="btn number">1</button>
                <button class="btn number">2</button>
                <button class="btn number">3</button>
                <button class="btn operator">+</button>
                <button class="btn number">ln</button>
                <button class="btn number">+/-</button>
                <button class="btn number">0</button>
                <button class="btn number">.</button>
                <button class="btn equal">=</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
